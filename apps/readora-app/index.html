<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <style>
          .titlebar {
              display: flex;
              align-items: center;
              justify-content: flex-start;
              box-sizing: border-box;
              padding-left: 10px;
              overflow: hidden;
              position: fixed;
              top: 0;
              left: 0;
              right: 0;
              z-index: 4000;
          }
          body[data-window-chrome="false"] .titlebar {
              display: none;
          }

          .titlebar-button {
              display: inline-flex;
              justify-content: center;
              align-items: center;
              width: 26px;
              height: 26px;
              flex: 0 0 26px;
              position: relative;
              overflow: hidden;
              line-height: 0;
              user-select: none;
              -webkit-user-select: none;
          }
          .marker-container {
              display: inline-flex;
              align-items: center;
              gap: 6px;
              width: max-content;
              min-width: max-content;
              padding: 0;
              white-space: nowrap;
              flex-wrap: nowrap;
              flex: 0 0 auto;
          }
          .marker-container:hover {
                cursor: pointer;
          }

          .titlebar-button svg {
              position: absolute;
              left: 50%;
              top: 50%;
              width: 16px;
              height: 16px;
              transform: translate(-50%, -50%);
              display: block;
              pointer-events: none;
          }

          /* 默认显示_default.svg */
          .titlebar-button svg[class$="default"] {
              display: block;
          }

          .titlebar-button svg[class$="hover"] {
              display: none;
          }

          /* 悬停时显示_hover.svg */
          .marker-container:hover .titlebar-button svg[class$="default"] {
              display: none;
          }
          .marker-container:hover .titlebar-button svg[class$="hover"] {
              display: block;
          }
      </style>

      <title>readora</title>
  </head>
