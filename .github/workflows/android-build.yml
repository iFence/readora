name: Android Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-android:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    env:
      JAVA_VERSION: '17'
      ANDROID_API_LEVEL: '34'
      ANDROID_BUILD_TOOLS: '34.0.0'
      ANDROID_NDK_VERSION: '27.0.12077973'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: ''

      - name: Install Android SDK packages
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-${ANDROID_API_LEVEL}" \
            "build-tools;${ANDROID_BUILD_TOOLS}" \
            "ndk;${ANDROID_NDK_VERSION}"

      - name: Export Android environment
        run: |
          echo "ANDROID_HOME=${ANDROID_SDK_ROOT}" >> "$GITHUB_ENV"
          echo "NDK_HOME=${ANDROID_SDK_ROOT}/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Install Rust toolchain with Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Rust build outputs
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/readora-app/src-tauri -> target

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Initialize Tauri Android project
        working-directory: apps/readora-app
        run: pnpm tauri android init --ci --skip-targets-install

      - name: Setup Android signing
        if: ${{ secrets.ANDROID_KEY_ALIAS != '' && secrets.ANDROID_KEY_PASSWORD != '' && secrets.ANDROID_KEY_BASE64 != '' }}
        working-directory: apps/readora-app/src-tauri/gen/android
        run: |
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" > keystore.properties
          echo "password=${{ secrets.ANDROID_KEY_PASSWORD }}" >> keystore.properties
          echo "${{ secrets.ANDROID_KEY_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/keystore.jks"
          echo "storeFile=$RUNNER_TEMP/keystore.jks" >> keystore.properties

      - name: Build signed Android release
        if: ${{ secrets.ANDROID_KEY_ALIAS != '' && secrets.ANDROID_KEY_PASSWORD != '' && secrets.ANDROID_KEY_BASE64 != '' }}
        working-directory: apps/readora-app
        run: pnpm tauri android build --apk --aab --ci

      - name: Build Android debug package
        if: ${{ !(secrets.ANDROID_KEY_ALIAS != '' && secrets.ANDROID_KEY_PASSWORD != '' && secrets.ANDROID_KEY_BASE64 != '') }}
        working-directory: apps/readora-app
        run: pnpm tauri android build --debug --apk --ci

      - name: Upload Android APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: readora-android-apk-${{ github.run_number }}
          path: apps/readora-app/src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload Android AAB artifacts
        if: ${{ secrets.ANDROID_KEY_ALIAS != '' && secrets.ANDROID_KEY_PASSWORD != '' && secrets.ANDROID_KEY_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: readora-android-aab-${{ github.run_number }}
          path: apps/readora-app/src-tauri/gen/android/app/build/outputs/bundle/**/*.aab
          if-no-files-found: error
          retention-days: 14
